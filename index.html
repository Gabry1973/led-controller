<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080b0f" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LED Ctrl" />
  <title>LED Controller v2 – Lights Co</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23080b0f'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23e74c3c'/%3E%3Ccircle cx='32' cy='16' r='6' fill='%232ecc71'/%3E%3Ccircle cx='48' cy='16' r='6' fill='%233498db'/%3E%3Ccircle cx='16' cy='32' r='6' fill='%23f1c40f'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%23e91e8c'/%3E%3Ccircle cx='48' cy='32' r='6' fill='%231abc9c'/%3E%3Ccircle cx='16' cy='48' r='6' fill='%239b59b6'/%3E%3Ccircle cx='32' cy='48' r='6' fill='%23e67e22'/%3E%3Ccircle cx='48' cy='48' r='6' fill='%2300d4ff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="prog-banner" id="prog-banner">⚡ PROG MODE — LONG PRESS SCENE TO EXIT</div>

<div id="app">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo-area" id="logo-btn" title="Tap to refresh">
      <div class="logo-dots" id="logo-dots"></div>
      <div class="logo-text">
        <span class="brand">LIGHTS CO</span>
        <span class="tagline">lighting innovation</span>
      </div>
    </div>

    <div class="tx-group">
      <button class="tx-btn tx-btn-all active" id="btn-all" onclick="selectTx(0)">ALL</button>
      <button class="tx-btn tx-btn-1" id="btn-tx1" onclick="selectTx(1)">
        TX 1 <span class="tx-status-dot" id="txdot-1"></span>
      </button>
      <button class="tx-btn tx-btn-2" id="btn-tx2" onclick="selectTx(2)">
        TX 2 <span class="tx-status-dot" id="txdot-2"></span>
      </button>
      <button class="tx-btn tx-btn-3" id="btn-tx3" onclick="selectTx(3)">
        TX 3 <span class="tx-status-dot" id="txdot-3"></span>
      </button>
      <button class="tx-btn tx-btn-4" id="btn-tx4" onclick="selectTx(4)">
        TX 4 <span class="tx-status-dot" id="txdot-4"></span>
      </button>
    </div>

    <div class="header-actions">
      <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
      <button class="icon-btn danger" onclick="confirmExit()" title="Exit">✕</button>
    </div>
  </header>

  <!-- ══ MAIN ══ -->
  <div class="main-content">

    <!-- LEFT: Scene + Timeline -->
    <div class="left-panel">
      <div class="scene-row">
        <button class="scene-btn" id="s1"
          onmousedown="sceneDown(this)" onmouseup="sceneUp(this)"
          ontouchstart="sceneDown(this)" ontouchend="sceneUp(this)"
          onmouseleave="sceneLeave(this)">S1</button>
        <button class="scene-btn" id="s2"
          onmousedown="sceneDown(this)" onmouseup="sceneUp(this)"
          ontouchstart="sceneDown(this)" ontouchend="sceneUp(this)"
          onmouseleave="sceneLeave(this)">S2</button>
        <button class="scene-btn" id="s3"
          onmousedown="sceneDown(this)" onmouseup="sceneUp(this)"
          ontouchstart="sceneDown(this)" ontouchend="sceneUp(this)"
          onmouseleave="sceneLeave(this)">S3</button>
        <button class="scene-btn" id="s4"
          onmousedown="sceneDown(this)" onmouseup="sceneUp(this)"
          ontouchstart="sceneDown(this)" ontouchend="sceneUp(this)"
          onmouseleave="sceneLeave(this)">S4</button>
      </div>

      <div class="timeline-section">
        <div class="timeline-section-label">Programs</div>
        <div class="timeline-grid" id="timeline-grid"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">

      <!-- Now playing -->
      <div class="now-playing">
        <span class="now-playing-label">NOW</span>
        <span class="now-playing-value" id="current-label">–</span>
        <span class="global-status" id="global-status"></span>
      </div>

      <!-- Sliders -->
      <div class="controls-card">
        <div class="slider-block">
          <div class="slider-header">
            <span class="slider-name">Brightness</span>
            <div class="slider-val"><span id="brightness-val">10</span><span>/10</span></div>
          </div>
          <div class="slider-track">
            <div class="slider-fill" id="brightness-fill" style="width:100%"></div>
            <input type="range" id="brightness-slider" min="1" max="10" value="10"
              oninput="onBrightness(this.value)" onchange="sendBrightness(this.value)">
          </div>
        </div>

        <div class="divider-v"></div>

        <div class="slider-block">
          <div class="slider-header">
            <span class="slider-name">Speed</span>
            <div class="slider-val"><span id="speed-val">8</span><span>/10</span></div>
          </div>
          <div class="slider-track">
            <div class="slider-fill" id="speed-fill" style="width:80%"></div>
            <input type="range" id="speed-slider" min="1" max="10" value="8"
              oninput="onSpeed(this.value)" onchange="sendSpeed(this.value)">
          </div>
        </div>
      </div>

      <!-- Colors -->
      <div class="colors-card">
        <div class="card-label">Colors</div>
        <div class="color-swatches" id="color-swatches"></div>
      </div>

      <!-- Effects -->
      <div class="effects-card">
        <div class="card-label">Effects</div>
        <div class="effects-grid">
          <button class="fx-btn fx-btn-loop" id="btn-loop" onclick="sendTimeline(0)">
            <span class="fx-icon">⟳</span> Loop
          </button>
          <button class="fx-btn fx-btn-strobe" id="btn-strobe" onclick="sendEfx(2)">
            <span class="fx-icon">⚡</span> Strobe
          </button>
          <button class="fx-btn fx-btn-flash" id="btn-wflash" onclick="sendEfx(1)">
            <span class="fx-icon">◈</span> White Flash
          </button>
          <button class="fx-btn fx-btn-fade" id="btn-fade" onclick="sendTimeline(127)">
            <span class="fx-icon">◐</span> Fade
          </button>
          <button class="fx-btn fx-btn-colorflash" id="btn-cflash" onclick="sendTimeline(128)">
            <span class="fx-icon">✦</span> Color Flash
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ══ MODALS ══ -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <div class="modal-title">Settings</div>
    <div class="modal-field"><label>TX 1 — IP Address</label><input type="text" id="ip1" placeholder="192.168.80.5"></div>
    <div class="modal-field"><label>TX 2 — IP Address</label><input type="text" id="ip2" placeholder="192.168.80.6"></div>
    <div class="modal-field"><label>TX 3 — IP Address</label><input type="text" id="ip3" placeholder="192.168.80.7"></div>
    <div class="modal-field"><label>TX 4 — IP Address</label><input type="text" id="ip4" placeholder="192.168.80.8"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-confirm" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-login">
  <div class="modal">
    <div class="modal-title">Admin Login</div>
    <div class="modal-field">
      <label>Password</label>
      <input type="password" id="login-pwd" placeholder="Enter password" onkeyup="loginKeyUp(event)">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLogin()">Cancel</button>
      <button class="btn-confirm" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-exit">
  <div class="modal">
    <div class="modal-title">Exit Application?</div>
    <p style="color:var(--text-mid);font-size:13px;line-height:1.5">
      The controller will stop responding to commands from this device.
    </p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeExit()">Cancel</button>
      <button class="btn-confirm btn-danger" onclick="doExit()">Exit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const state = {
  ipList: ['192.168.80.5','192.168.80.6','192.168.80.7','192.168.80.8'],
  currentTx: 0,
  bProgScene: false,
  progScene: null,
  scenes: { s1:[-1,-1,-1,-1], s2:[-1,-1,-1,-1], s3:[-1,-1,-1,-1], s4:[-1,-1,-1,-1] },
  lastCurrent: '',
  sceneMouseDown: false,
  sceneDownTime: 0,
};

// ═══════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════
function loadStorage() {
  try {
    const ips = localStorage.getItem('lc_ipList');
    if (ips) state.ipList = JSON.parse(ips);
    const sc = localStorage.getItem('lc_scenes');
    if (sc) state.scenes = JSON.parse(sc);
  } catch(e) {}
}
function saveStorage() {
  try {
    localStorage.setItem('lc_ipList', JSON.stringify(state.ipList));
    localStorage.setItem('lc_scenes', JSON.stringify(state.scenes));
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  MAPS
// ═══════════════════════════════════════════════
const tlNames = {
  0:'LOOP', 127:'FADE', 128:'COLOR FLASH',
  110:'RED', 111:'ORANGE', 112:'YELLOW', 113:'GREEN',
  114:'SKY', 115:'BLUE', 116:'PURPLE', 117:'PINK',
  118:'WHITE', 119:'BLACK',
  130:'Prog 1',131:'Prog 2',132:'Prog 3',133:'Prog 4',134:'Prog 5',
  135:'Prog 6',136:'Prog 7',137:'Prog 8',138:'Prog 9',139:'Prog 10',
  140:'Prog 11',141:'Prog 12',142:'Prog 13',143:'Prog 14',144:'Prog 15',
  145:'Prog 16',146:'Prog 17',147:'Prog 18',148:'Prog 19',149:'Prog 20',
};

const colorDefs = [
  { tl:110, bg:'#c0392b', glow:'rgba(192,57,43,0.7)' },
  { tl:111, bg:'#d35400', glow:'rgba(211,84,0,0.7)' },
  { tl:112, bg:'#f1c40f', glow:'rgba(241,196,15,0.7)' },
  { tl:113, bg:'#27ae60', glow:'rgba(39,174,96,0.7)' },
  { tl:114, bg:'#16a085', glow:'rgba(22,160,133,0.7)' },
  { tl:115, bg:'#2980b9', glow:'rgba(41,128,185,0.7)' },
  { tl:116, bg:'#8e44ad', glow:'rgba(142,68,173,0.7)' },
  { tl:117, bg:'#e91e8c', glow:'rgba(233,30,140,0.7)' },
  { tl:118, bg:'linear-gradient(135deg,#ecf0f1,#bdc3c7)', glow:'rgba(200,210,220,0.5)' },
  { tl:119, bg:'#2c3e50', glow:'rgba(44,62,80,0.5)' },
];

// ═══════════════════════════════════════════════
//  BUILD UI
// ═══════════════════════════════════════════════
function buildLogoDots() {
  const colors = [
    '#e74c3c','#2ecc71','#3498db','#f1c40f',
    '#e91e8c','#1abc9c','#9b59b6','#e67e22',
    '#a8e063','#74b9ff','#fd79a8','#55efc4',
  ];
  const c = document.getElementById('logo-dots');
  colors.forEach(col => {
    const d = document.createElement('div');
    d.className = 'logo-dot';
    d.style.background = col;
    c.appendChild(d);
  });
}

function buildTimelineGrid() {
  const grid = document.getElementById('timeline-grid');
  const colorClasses = ['tl-red','tl-green','tl-blue','tl-white'];
  for (let n = 1; n <= 20; n++) {
    const tl = 129 + n;
    const btn = document.createElement('button');
    btn.className = `tl-btn ${colorClasses[(n-1) % 4]}`;
    btn.textContent = n;
    btn.dataset.tl = tl;
    btn.id = `tl-${tl}`;
    btn.onclick = () => tlClick(tl, btn);
    grid.appendChild(btn);
  }
}

function buildColorSwatches() {
  const container = document.getElementById('color-swatches');
  colorDefs.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c.bg;
    sw.style.setProperty('--swatch-glow', c.glow);
    sw.id = `col-${c.tl}`;
    sw.dataset.tl = c.tl;
    sw.onclick = () => tlClick(c.tl, sw);
    container.appendChild(sw);
  });
}

// ═══════════════════════════════════════════════
//  TX SELECTION
// ═══════════════════════════════════════════════
function selectTx(n) {
  state.currentTx = n;
  ['btn-all','btn-tx1','btn-tx2','btn-tx3','btn-tx4'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === n);
  });
  updateTxVisibility();
  if (state.bProgScene) showCurrentScene();
  else getInfo();
}

function updateTxVisibility() {
  [2,3,4].forEach(n => {
    const el = document.getElementById(`btn-tx${n}`);
    el.style.display = state.ipList[n-1] ? '' : 'none';
  });
}

// ═══════════════════════════════════════════════
//  TX HEALTH MONITOR
// ═══════════════════════════════════════════════
const txStatus = {1:'unknown',2:'unknown',3:'unknown',4:'unknown'};
let healthTimer = null;

function setTxDot(n, status) {
  if (txStatus[n] === status) return;
  const prev = txStatus[n];
  txStatus[n] = status;
  const dot = document.getElementById(`txdot-${n}`);
  if (dot) dot.className = 'tx-status-dot ' + status;
  if (state.currentTx === n) setGlobalStatus(status);
  if (status === 'err' && prev !== 'unknown') showToast(`TX ${n} non raggiungibile`, 'error');
}

async function pingTx(n) {
  const ip = state.ipList[n-1];
  if (!ip) { setTxDot(n,'unknown'); return; }
  try { await httpGet(ip, '/txinfo'); setTxDot(n,'ok'); }
  catch(e) { setTxDot(n,'err'); }
}

function pingAll() {
  state.ipList.forEach((ip, i) => { if (ip) pingTx(i+1); });
}

function startMonitor() {
  stopMonitor();
  pingAll();
  healthTimer = setInterval(pingAll, 5000);
}

function stopMonitor() {
  if (healthTimer) { clearInterval(healthTimer); healthTimer = null; }
}

// ═══════════════════════════════════════════════
//  HTTP
// ═══════════════════════════════════════════════
async function httpGet(ip, path) {
  const r = await fetch(`http://${ip}${path}`, { signal: AbortSignal.timeout(800) });
  return r.text();
}
async function httpPost(ip, path, params) {
  const r = await fetch(`http://${ip}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams(params).toString(),
    signal: AbortSignal.timeout(800),
  });
  return r.text();
}

function getTargetIps() {
  if (state.currentTx === 0) return state.ipList.filter(Boolean);
  const ip = state.ipList[state.currentTx - 1];
  return ip ? [ip] : [];
}

// ═══════════════════════════════════════════════
//  STATUS UI
// ═══════════════════════════════════════════════
function setCurrentLabel(text) {
  document.getElementById('current-label').textContent = text.toUpperCase();
}
function setGlobalStatus(s) {
  const el = document.getElementById('global-status');
  el.className = 'global-status' + (s !== 'idle' ? ` ${s}` : '');
}

// ═══════════════════════════════════════════════
//  COMMANDS
// ═══════════════════════════════════════════════
async function sendTimeline(tl) {
  if (state.bProgScene) { setSceneTimeline(tl); return; }
  setCurrentLabel(tlNames[tl] || `TL ${tl}`);
  setGlobalStatus('sending');
  clearFxActive();
  try {
    await Promise.all(getTargetIps().map(ip => httpPost(ip, '/chtl', { tlnum: tl })));
    setGlobalStatus('ok');
  } catch(e) { setGlobalStatus('err'); }
}

async function sendEfx(efxnum) {
  if (state.bProgScene) return;
  setGlobalStatus('sending');
  const ips = getTargetIps();
  let newEfx = 0;
  try {
    const res = await Promise.all(ips.map(ip => httpPost(ip, '/setefx', { efxnum })));
    if (res[0]) newEfx = parseInt(res[0]) || 0;
    setGlobalStatus('ok');
  } catch(e) { setGlobalStatus('err'); }
  document.getElementById('btn-strobe').classList.toggle('active', newEfx === 2);
  document.getElementById('btn-wflash').classList.toggle('active', newEfx === 1);
}

async function sendBrightness(val) {
  setGlobalStatus('sending');
  try {
    await Promise.all(getTargetIps().map(ip => httpGet(ip, `/setbrightness${val}`)));
    setGlobalStatus('ok');
  } catch(e) { setGlobalStatus('err'); }
}

async function sendSpeed(val) {
  setGlobalStatus('sending');
  try {
    await Promise.all(getTargetIps().map(ip => httpGet(ip, `/setspeed${val}`)));
    setGlobalStatus('ok');
  } catch(e) { setGlobalStatus('err'); }
}

async function getInfo() {
  const idx = state.currentTx <= 1 ? 0 : state.currentTx - 1;
  const ip = state.ipList[idx];
  if (!ip) return;
  try {
    const ris = await httpGet(ip, '/txinfo');
    parseInfo(ris);
    setGlobalStatus('ok');
  } catch(e) { setGlobalStatus('err'); }
}

function parseInfo(ris) {
  ris.split('|').forEach(part => {
    const [k,v] = part.split('=');
    if (!k || v === undefined) return;
    const val = parseInt(v);
    if (k === 'timeline') setCurrentLabel(tlNames[val] || `TL ${val}`);
    if (k === 'efx') {
      document.getElementById('btn-strobe').classList.toggle('active', val === 2);
      document.getElementById('btn-wflash').classList.toggle('active', val === 1);
    }
    if (k === 'vel')    { document.getElementById('speed-slider').value = val; onSpeed(val); }
    if (k === 'bright') { document.getElementById('brightness-slider').value = val; onBrightness(val); }
  });
}

function clearFxActive() {
  document.getElementById('btn-strobe').classList.remove('active');
  document.getElementById('btn-wflash').classList.remove('active');
}

// ═══════════════════════════════════════════════
//  SLIDER HANDLERS
// ═══════════════════════════════════════════════
function onBrightness(v) {
  document.getElementById('brightness-val').textContent = v;
  document.getElementById('brightness-fill').style.width = ((v-1)/9*100) + '%';
}
function onSpeed(v) {
  document.getElementById('speed-val').textContent = v;
  document.getElementById('speed-fill').style.width = ((v-1)/9*100) + '%';
}

// ═══════════════════════════════════════════════
//  TIMELINE CLICK
// ═══════════════════════════════════════════════
function tlClick(tl, el) {
  document.querySelectorAll('.tl-btn.selected,.color-swatch.selected').forEach(b => b.classList.remove('selected'));
  el?.classList.add('selected');
  sendTimeline(tl);
}

// ═══════════════════════════════════════════════
//  SCENE PROGRAMMING
// ═══════════════════════════════════════════════
let sceneHoldTimer = null;

function sceneDown(el) {
  state.sceneMouseDown = true;
  state.sceneDownTime = Date.now();
  el.classList.add('active');
  sceneHoldTimer = setTimeout(() => {
    if (state.sceneMouseDown) enterProgMode(el);
  }, 5000);
}

function sceneUp(el) {
  clearTimeout(sceneHoldTimer);
  const held = Date.now() - state.sceneDownTime;
  state.sceneMouseDown = false;
  if (state.bProgScene) {
    if (held < 5000) {
      document.querySelectorAll('.scene-btn').forEach(s => s.classList.remove('active','prog-mode'));
      el.classList.add('prog-mode');
      state.progScene = el.id;
      setCurrentLabel('PROG ' + el.id.toUpperCase());
      showCurrentScene();
    }
  } else {
    el.classList.remove('active');
    sendScene(el);
  }
}

function sceneLeave(el) {
  clearTimeout(sceneHoldTimer);
  state.sceneMouseDown = false;
  if (!state.bProgScene) el.classList.remove('active');
}

function enterProgMode(el) {
  state.bProgScene = true;
  state.lastCurrent = document.getElementById('current-label').textContent;
  if (state.currentTx === 0) selectTx(1);
  document.querySelectorAll('.scene-btn').forEach(s => s.classList.remove('active','prog-mode'));
  el.classList.add('prog-mode');
  state.progScene = el.id;
  setCurrentLabel('PROG ' + el.id.toUpperCase());
  document.getElementById('prog-banner').classList.add('show');
  showCurrentScene();
}

function exitProgMode() {
  saveStorage();
  state.bProgScene = false;
  document.querySelectorAll('.scene-btn').forEach(s => s.classList.remove('active','prog-mode'));
  document.getElementById('prog-banner').classList.remove('show');
  document.querySelectorAll('.tl-btn.selected,.color-swatch.selected').forEach(b => b.classList.remove('selected'));
  setCurrentLabel(state.lastCurrent || '–');
}

function setSceneTimeline(tl) {
  if (!state.bProgScene || !state.progScene) return;
  const idx = state.currentTx > 0 ? state.currentTx - 1 : 0;
  state.scenes[state.progScene][idx] = tl;
  showCurrentScene();
  showToast(`${state.progScene.toUpperCase()} TX${idx+1} → ${tlNames[tl] || tl}`, 'success');
}

function showCurrentScene() {
  document.querySelectorAll('.tl-btn.selected,.color-swatch.selected').forEach(b => b.classList.remove('selected'));
  if (!state.bProgScene || !state.progScene) return;
  const idx = state.currentTx > 0 ? state.currentTx - 1 : 0;
  const tl = state.scenes[state.progScene][idx];
  if (tl !== -1) {
    const el = document.getElementById(`tl-${tl}`) || document.getElementById(`col-${tl}`);
    if (el) el.classList.add('selected');
  }
}

async function sendScene(el) {
  const sc = state.scenes[el.id];
  setCurrentLabel('SCENE ' + el.id.toUpperCase());
  setGlobalStatus('sending');
  try {
    const promises = [];
    state.ipList.forEach((ip, i) => {
      if (ip && sc[i] !== -1) promises.push(httpPost(ip, '/chtl', { tlnum: sc[i] }));
    });
    await Promise.all(promises);
    setGlobalStatus('ok');
  } catch(e) { setGlobalStatus('err'); }
}

// ALL button exits prog mode
document.getElementById('btn-all').addEventListener('click', () => {
  if (state.bProgScene) exitProgMode();
});

// Logo = refresh
document.getElementById('logo-btn').addEventListener('click', () => {
  if (!state.bProgScene) getInfo();
});

// ═══════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════
function openSettings() {
  ['ip1','ip2','ip3','ip4'].forEach((id,i) => {
    document.getElementById(id).value = state.ipList[i] || '';
  });
  document.getElementById('modal-settings').classList.add('open');
}
function closeSettings() {
  document.getElementById('modal-settings').classList.remove('open');
}
function saveSettings() {
  state.ipList = ['ip1','ip2','ip3','ip4'].map(id => document.getElementById(id).value.trim());
  saveStorage();
  updateTxVisibility();
  [1,2,3,4].forEach(n => {
    txStatus[n] = 'unknown';
    const d = document.getElementById(`txdot-${n}`);
    if (d) d.className = 'tx-status-dot';
  });
  closeSettings();
  showToast('Settings saved!', 'success');
  startMonitor();
}

// ═══════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════
function openLogin() {
  document.getElementById('login-pwd').value = '';
  document.getElementById('modal-login').classList.add('open');
  setTimeout(() => document.getElementById('login-pwd').focus(), 200);
}
function closeLogin() { document.getElementById('modal-login').classList.remove('open'); }
function loginKeyUp(e) { if (e.key === 'Enter') doLogin(); }
function doLogin() {
  if (document.getElementById('login-pwd').value === 'adminGiorgio') {
    closeLogin(); openSettings();
  } else {
    document.getElementById('login-pwd').value = '';
    showToast('Wrong password', 'error');
  }
}

// ═══════════════════════════════════════════════
//  EXIT
// ═══════════════════════════════════════════════
function confirmExit() { document.getElementById('modal-exit').classList.add('open'); }
function closeExit()    { document.getElementById('modal-exit').classList.remove('open'); }
function doExit() {
  closeExit();
  window.close();
  setTimeout(() => showToast('Close this tab to exit', 'error'), 300);
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ` ${type}` : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  loadStorage();
  buildLogoDots();
  buildTimelineGrid();
  buildColorSwatches();
  updateTxVisibility();
  setTimeout(() => { getInfo(); startMonitor(); }, 500);
}

init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
